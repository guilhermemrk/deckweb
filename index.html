<!DOCTYPE html4>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/script.js" type="text/javascript"></script>
  </head>
  <body>
    <div id="fContent">
      <div id="uContent">
        <div id="confPanel">
            <span id="howManyDecks">
              <label for="nBaralho">Quantos baralhos?</label>
              <input type="text" onfocusout="cnBaralho(baralho)" name="nBaralho" id="nBaralho" maxlength="3" value="">
            </span>
             <button onclick="docW(array)" id="createDecksButton">Gerar baralhos</button>
        </div>
        <div class="manipulationPanel">
          <span id="whatRemove">
            <label for="remBaralho">Qual carta você gostaria de remover?</label>
            <input type="text" onfocusout="remBaralhoF(array)" name="remBaralho" id="remBaralho" maxlength="30" value="">
          </span>
          <button onclick="upRemBaralho(array)" id="remCardButton">Remover</button><br /><br />
          <span id="remSucc"></span>
        </div>
        <div class="manipulationPanel">
          <span id="whatAdd">
            <label for="addBaralho">Qual carta você gostaria de adicionar?</label>
            <input type="text" name="addBaralho" id="addBaralho" maxlength="30" value="">
          </span>
          <button onclick="Add(array)" id="addCardButton">Adicionar</button><br /><br />
          <span id="addSucc"></span>
        </div>
        <div id='resultPanel'>
          <div id="resultPanelOne">
            <button onclick="checkDeck(array)" id="checkDeckButton">Check Deck</button>
            <div id='checkDeckShow'></div>
            <span id="checkDeckShowTwo"></span>
          </div>
          <div id="resultPanelTwo">
            <span id="whatCardProb">
              <label for="probBaralho">Qual carta você gostaria de puxar?</label>
              <input type="text" name="probBaralho" id="probBaralho" maxlength="30" value="">
            </span>
            <button onclick="probability(array)" id="probBaralhoButton">Calcular</button><br /><br />
            <span id="probSucc"></span>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
